appId: com.ivanyort.stickban
productName: Stickban
asar: true
directories:
  output: dist
files:
  - out/**
  - package.json
linux:
  target:
    - AppImage
    - tar.gz
win:
  icon: logos/ico_kit/Web/stickban-app.ico
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  runAfterFinish: false
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
publish:
  - provider: github
    owner: ivanyort
    repo: stickban
    releaseType: release
